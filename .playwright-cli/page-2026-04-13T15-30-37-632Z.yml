        - list [ref=e85]:
          - listitem [ref=e86] [cursor=pointer]:
            - img "A retro-futurist vision shaped through AI imagery, cinematic motion and luminous soundscapes. Metallic silhouettes, fashion influences and synthetic memories merge into an immersive environment where nostalgia bends toward a future that never existed but still feels strangely real." [ref=e87]
          - listitem [ref=e88] [cursor=pointer]:
            - img "This portfolio unfolds as an exposed process, gathering AI sketches, drafts, typographic tests and structural studies into a single immersive artboard. A brutalist grid and subtle WebGL depth shape a space where experimentation and identity quietly define each other." [ref=e89]
          - listitem [ref=e90] [cursor=pointer]:
            - img "A calm digital narrative built from soft gradients, gentle transitions and a restrained visual rhythm. Innovation becomes tactile as AI integrates into each scene with quiet clarity, shaping an elegant experience that turns complexity into a natural and intuitive flow." [ref=e91]
          - listitem [ref=e92] [cursor=pointer]:
            - img "A tech-editorial environment defined by bold typography, clean imagery and sharp structural clarity. Each layout balances discipline and momentum, creating a refined digital presence where innovation becomes a precise visual language that moves confidently forward." [ref=e93]
          - listitem [ref=e94] [cursor=pointer]:
            - img "A landscape of grain, muted tones and cartographic textures evokes the rugged stillness of alpine territory. Vintage-park cues and weathered visuals form an atmosphere of exploration, transforming the valley's geography into a quiet, immersive field of memory and terrain." [ref=e95]
          - listitem [ref=e96] [cursor=pointer]:
            - img "A data-driven digital environment built around clarity, precision, and controlled intensity. Dark surfaces, neon accents, and immersive scroll interactions translate analytical thinking into a visual system where information feels alive, dynamic, and intentionally structured." [ref=e97]
          - listitem [ref=e98] [cursor=pointer]:
            - img "An ongoing visual exploration where AI-generated imagery becomes a tool for studying shape, balance and visual tension, transforming raw experimentation into controlled aesthetic research." [ref=e99]
          - listitem [ref=e100] [cursor=pointer]:
            - img "Corporate experience turning data into clarity. Deep tech blues and neon accents create a sophisticated narrative, signaling intelligence before explaining it." [ref=e101]
